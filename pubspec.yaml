name: car225
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+15

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # ✅ Localisations (Nécessaire pour le calendrier)
  flutter_localizations:
    sdk: flutter

  # --- Architecture & State Management ---
  flutter_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4
  hooks_riverpod: ^2.4.9
  provider: ^6.1.1
  local_auth: ^2.1.6

  flutter_local_notifications: ^18.0.1
  # --- Navigation & Réseau ---
  go_router: ^13.1.0
  dio: ^5.9.1
  connectivity_plus: ^5.0.2
  curved_navigation_bar: ^1.0.3

  geolocator: ^14.0.2
  geocoding: ^2.1.1

  esc_pos_utils_plus: ^2.0.3

  # --- UI & Animations ---
  flutter_animate: ^4.5.0
  flutter_svg: ^2.2.3
  google_fonts: ^6.1.0
  gap: ^3.0.0

  cinetpay: ^1.0.8 # Vérifie la dernière version sur pub.dev
  uuid: ^4.0.0

  # --- Stockage Local & Base de données ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4

  # --- Firebase ---
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

  # --- Utilitaires ---
  # 👇 CORRECTION ICI : Passage à la version 0.20.2 requise par Flutter
  intl: ^0.20.2

  equatable: ^2.0.5
  fpdart: ^1.1.0
  image_picker: ^1.0.7
  device_info_plus: ^12.3.0
  io: ^1.0.5
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.13.1

  # --- Fichiers & PDF ---
  path_provider: ^2.0.15
  open_filex: ^4.3.2
  permission_handler: ^11.3.0
  screenshot: ^3.0.0

  google_sign_in: ^6.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.6.0
  app_links: ^7.0.0
  image: ^4.8.0
  print_bluetooth_thermal: ^1.1.9
  flutter_map: ^8.2.2
  flutter_foreground_task: ^9.2.2
  google_mobile_ads: ^7.0.0
  in_app_update: ^4.2.5
  sign_in_with_apple: ^7.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

# --- CONFIGURATION DES ICÔNES ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icone.jpg"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/icons/icone.jpg"

# --- CONFIGURATION FLUTTER ---
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/vectors/
    - assets/icons/